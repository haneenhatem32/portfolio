<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Haneen</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <script src="js/components.js" defer></script>
    <script src="js/main.js" defer></script>
    <style>
        .contact-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .contact-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 600px) {
            .contact-container { padding: 2rem; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <site-navbar></site-navbar>

    <main class="container section" style="min-height: 80vh; display: flex; align-items: center;">
        
        <div class="contact-container animate-on-scroll" style="width: 100%;">
            <div class="contact-header">
                <h1 style="font-size: clamp(2rem, 4vw, 3rem);">Let's Work Together</h1>
                <p>Have a project in mind or just want to say hi? Feel free to reach out. I'm currently open for new freelance opportunities.</p>
            </div>

            <form action="https://formspree.io/f/xrejewye" method="POST" id="contact-form">
                <input type="hidden" name="_subject" value="New message from your portfolio!">
                <input type="text" name="_gotcha" style="display:none">

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="name">Name</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" class="form-control" placeholder="Project Inquiry" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="message">Message</label>
                    <textarea id="message" name="message" class="form-control" placeholder="Tell me about your project..." required></textarea>
                </div>

                <div id="form-status" style="text-align: center; margin-bottom: 1rem; display: none;"></div>

                <div style="text-align: center; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; max-width: 200px;">Send Message</button>
                </div>
            </form>

            <script>
                const form = document.getElementById('contact-form');
                const status = document.getElementById('form-status');

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const btn = form.querySelector('button[type="submit"]');
                    btn.textContent = 'Sending...';
                    btn.disabled = true;

                    try {
                        const res = await fetch(form.action, {
                            method: 'POST',
                            body: new FormData(form),
                            headers: { 'Accept': 'application/json' }
                        });

                        if (res.ok) {
                            status.style.display = 'block';
                            status.style.color = 'var(--primary)';
                            status.textContent = '✅ Message sent successfully! I\'ll get back to you soon.';
                            form.reset();
                        } else {
                            throw new Error('Failed');
                        }
                    } catch (err) {
                        status.style.display = 'block';
                        status.style.color = '#ff6b6b';
                        status.textContent = '❌ Oops! Something went wrong. Please try again.';
                    }

                    btn.textContent = 'Send Message';
                    btn.disabled = false;
                });
            </script>
        </div>

    </main>

    <site-footer></site-footer>

</body>
</html>
